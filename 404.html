<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CulinaSync - Weiterleitung...</title>
    <meta http-equiv="refresh" content="0;url=./" />
    <script>
      (function () {
        var pathSegmentsToKeep = 1; // /CulinaSync-de-
        var l = window.location;
        var base = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var rest = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
        var search = l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
        var redirectUrl = l.protocol + '//' + l.host + base + '/?/' + rest + search + l.hash;
        l.replace(redirectUrl);
      })();
    </script>
  </head>
  <body>
    <noscript>Weiterleitung zur Startseite...</noscript>
  </body>
</html>
