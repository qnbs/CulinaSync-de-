# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# =============================================================================
# CodeRabbit AI configuration — CulinaSync
# =============================================================================
# Operating guide: docs/runbooks/CODERABBIT.md
# The path_instructions below teach CodeRabbit the project's HARD CONSTRAINTS
# (see CLAUDE.md) so reviews enforce the real architecture, not generic advice.
# =============================================================================

language: en-US
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: true
  sequence_diagrams: false
  poem: false
  review_status: true
  collapse_walkthrough: false
  abort_on_close: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  # Skip generated / vendored / lockfile noise; review source + workflows.
  path_filters:
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!pnpm-lock.yaml"
    - "!package-lock.json"
    - "!graphify-out/**"
    - "!**/*.snap"

  path_instructions:
    - path: "apps/web/src/**/*.{ts,tsx}"
      instructions: >-
        Enforce project hard constraints. (1) No `any` and no new eslint/biome
        suppressions — the quality gate is 0 warnings. (2) Dexie/IndexedDB writes
        must go through src/services/db.ts + repositories under
        src/services/repositories/ — flag any direct db.table.put()/delete() in
        components or hooks. (3) All Gemini model calls must go through
        src/services/geminiService.ts and Zod-validate AI JSON; flag raw
        GoogleGenAI usage elsewhere. (4) The API key must never be embedded via
        VITE_* / process.env / build-time — only apiKeyService.ts. (5) Redux is
        UI/session state only; flag mirroring of Dexie domain data into Redux.
        (6) Caught errors should use logAppError(); async-thunk errors flow via
        listenerMiddleware. (7) Modals must use useModalA11y with role="dialog"
        and aria-modal.
    - path: "apps/web/src/**/*.{ts,tsx}"
      instructions: >-
        i18n: every user-visible string and aria-label must go through t() with
        keys present in BOTH src/locales/de and src/locales/en
        (core.json/settings.json/features.json). Flag hardcoded UI strings.
    - path: "**/*.test.{ts,tsx}"
      instructions: >-
        Tests must not make real network calls — use vi.mock or MSW. Do not
        approve skipped/deleted tests used only to make CI pass; the root cause
        must be fixed.
    - path: ".github/workflows/**"
      instructions: >-
        Verify action pins, least-privilege permissions blocks, and that secrets
        are only passed to reusable workflows via `secrets: inherit`. Flag any
        shell step lacking `set -euo pipefail` where failures should surface.

  tools:
    biome:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
