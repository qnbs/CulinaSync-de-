<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="%BASE_URL%favicon.ico" />
    <link rel="apple-touch-icon" href="%BASE_URL%logo-192x192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CulinaSync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <meta name="theme-color" content="#09090b" />
    <style type="text/tailwindcss">
      @layer utilities {
        /* Animation Primitives */
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(8px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .page-fade-in {
          animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        @keyframes scaleIn {
          from { opacity: 0; transform: scale(0.96); }
          to { opacity: 1; transform: scale(1); }
        }
        .modal-fade-in {
            animation: scaleIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes pulse-soft {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.6; }
        }
        .animate-pulse-soft {
          animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Advanced Glassmorphism System */
        .glass-panel {
          @apply bg-zinc-900/40 backdrop-blur-md border border-white/10 shadow-xl;
        }
        .glass-panel-strong {
          @apply bg-zinc-950/70 backdrop-blur-xl border-b border-white/5 shadow-2xl supports-[backdrop-filter]:bg-zinc-950/60;
        }
        .glass-button {
           @apply bg-white/5 hover:bg-white/10 active:bg-white/15 border border-white/5 backdrop-blur-sm transition-all duration-200 active:scale-95;
        }
        
        /* Typography & Effects */
        .text-glow {
          text-shadow: 0 0 20px rgba(var(--color-accent-glow), 0.4);
        }
        .text-shadow-sm {
          text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .text-shadow-lg {
          text-shadow: 0 4px 12px rgba(0,0,0,0.8);
        }

        /* Mobile Optimizations */
        .no-scrollbar::-webkit-scrollbar {
          display: none;
        }
        .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
        
        .snap-x-mandatory {
            scroll-snap-type: x mandatory;
        }
        .snap-center {
            scroll-snap-align: center;
        }

        /* Safe Area Utilities */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .mb-safe {
            margin-bottom: env(safe-area-inset-bottom);
        }
        .bottom-safe {
            bottom: env(safe-area-inset-bottom);
        }
        
        /* High-performance transforms */
        .gpu {
            transform: translateZ(0);
            backface-visibility: hidden;
        }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-accent-400);
      }
    </style>
     <style>
      :root {
        --color-accent-300: #fcd34d;
        --color-accent-400: #fbbf24;
        --color-accent-500: #f59e0b;
        --color-accent-glow: 251, 191, 36; /* RGB format for rgba usage */
        --color-accent-glow-soft: rgba(251, 191, 36, 0.2);
        --color-accent-400-semi: rgba(251, 191, 36, 0.8);
      }
    </style>
</head>
  <body class="bg-zinc-950 text-zinc-200 font-sans antialiased selection:bg-[var(--color-accent-500)] selection:text-black overscroll-none">
    <!-- Ambient Background Glow -->
    <div class="fixed top-0 left-0 -z-10 h-full w-full bg-zinc-950 overflow-hidden pointer-events-none">
        <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-[rgba(var(--color-accent-glow),0.08)] blur-[120px] animate-pulse-soft"></div>
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] rounded-full bg-purple-900/10 blur-[120px]"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="%BASE_URL%index.tsx"></script>
  </body>
</html>
