<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0;url=./" />
    <title>CulinaSync – Weiterleitung...</title>
    <script>
        // SPA redirect for GitHub Pages
        // Converts deep-link paths into query parameters so index.html can handle routing.
        var pathSegmentsToKeep = 1; // Keep /REPO-NAME/ segment
        var l = window.location;
        var basePath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var normalizedBasePath = basePath.endsWith('/') ? basePath : basePath + '/';
        var deepLinkPath = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
        var redirectTarget = new URL(normalizedBasePath + '?/' + deepLinkPath, l.origin);
        redirectTarget.search += l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '';
        redirectTarget.hash = l.hash;
        l.replace(redirectTarget.toString());
    </script>
</head>
<body>
    <noscript>Weiterleitung...</noscript>
</body>
</html>
