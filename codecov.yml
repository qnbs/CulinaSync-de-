# =============================================================================
# Codecov configuration — CulinaSync
# =============================================================================
# Coverage is generated by Vitest (v8 provider) as lcov at apps/web/coverage/
# and uploaded from the reusable `validate` workflow (PRs via ci.yml, main via
# deploy.yml). See docs/runbooks/CODECOV.md for the full operating guide.
#
# Status checks start as `informational: true` (report, never block) so the
# team can ramp toward the ROADMAP ≥70% target without surprise CI failures.
# Flip `informational` to false to make a check blocking once coverage is stable.
# =============================================================================

codecov:
  require_ci_to_pass: true
  notify:
    # Wait for the single coverage upload before posting the PR comment.
    after_n_builds: 1

coverage:
  precision: 2
  round: down
  range: "45...70" # red below 45%, green at/above 70% (matches branch/line targets)

  status:
    project:
      default:
        # Compare against the base commit; allow a small drift before flagging.
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        # New/changed lines in a PR should be well covered.
        target: 60%
        threshold: 0%
        informational: true

# Post a single, concise report comment; update it in place on new pushes.
comment:
  layout: "condensed_header, diff, flags, components, condensed_files"
  behavior: default
  require_changes: false

# Per-app flag so multi-package coverage stays attributable.
flags:
  web:
    paths:
      - apps/web/src
    carryforward: true

# Exclude non-product code from coverage math.
ignore:
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/__tests__/**"
  - "**/__mocks__/**"
  - "**/test/**"
  - "**/*.config.ts"
  - "**/*.config.js"
  - "**/*.d.ts"
  - "scripts/**"
  - "packages/ui/**"
  - "**/vite-env.d.ts"
