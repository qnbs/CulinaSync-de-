# =============================================================================
# CulinaSync – E2E Smoke (Playwright + vite preview)
# =============================================================================
# Separater Lauf mit Playwright-Docker-Image (Browser vorinstalliert).
# Haupt-CI/Deploy überspringen E2E wegen instabilem Chromium-Download auf GHA-Runnern.
# =============================================================================

name: E2E Smoke

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'
  # QNBS-v3: Nach Merge auf main + relevante PRs — Playwright-Container, kein Chromium-Download auf ubuntu-latest
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e-smoke.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/e2e-smoke.yml'

permissions:
  contents: read

concurrency:
  group: e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      # QNBS-v3: tag MUST match @playwright/test in package.json (version mismatch aborts the run);
      # digest-pinned for immutable, reproducible pulls. Update both on every Playwright bump.
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CI: true
          GITHUB_ACTIONS: true

      - name: E2E smoke (Playwright + preview)
        run: pnpm run test:e2e
        env:
          CI: true
          GITHUB_ACTIONS: true

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7
