name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # QNBS-v3: Deploy auf main führt bereits validate.yml aus — kein paralleler Doppel-Lauf (CI-Minuten, Konsistenz)
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/validate.yml
    with:
      run-e2e-smoke: false

  i18n-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch PR base branch
        run: git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}

      - name: i18n changed-lines check
        run: pnpm run i18n:check:changed -- origin/${{ github.base_ref }}
