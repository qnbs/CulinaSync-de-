name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}

      - name: i18n changed-lines check
        if: github.event_name == 'pull_request'
        run: npm run i18n:check:changed -- origin/${{ github.base_ref }}
