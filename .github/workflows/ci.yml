name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/validate.yml
    # QNBS-v3: pass only the coverage token (least privilege) into the reusable workflow
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      run-e2e-smoke: false

  # QNBS-v3: main-guard ruft das volle reusable validate.yml (Single Source of Truth für Gates) |
  # Grund: der frühere Inline-Block deckte nur lint/type-check/test:scripts/i18n ab — der grüne
  # main-Status konnte "lügen", während Budget/Build/Audit/Coverage rot waren. Deploy (deploy.yml)
  # nutzt dasselbe validate.yml, daher deckt der main-Status jetzt exakt denselben Gate-Satz ab wie
  # der Deploy. E2E läuft separat (run-e2e-smoke: false). concurrency: cancel-in-progress verhindert
  # doppelte teure Läufe; Korrektheit > Runner-Minuten.
  main-guard:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/validate.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      run-e2e-smoke: false

  i18n-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch PR base branch
        run: git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}

      - name: i18n locale key parity
        run: pnpm run i18n:check:keys

      - name: i18n production baseline
        run: pnpm run i18n:check:baseline

      - name: i18n changed-lines check
        run: pnpm run i18n:check:changed -- origin/${{ github.base_ref }}
