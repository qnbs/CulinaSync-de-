name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/validate.yml
    with:
      run-e2e-smoke: false

  # QNBS-v3: Grüner CI-Status auf main ohne Doppel-test:coverage (volles validate in deploy.yml)
  main-guard:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run type-check

      - name: Test deploy verify scripts
        run: pnpm run test:scripts

      - name: i18n check
        run: pnpm run i18n:check

  i18n-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch PR base branch
        run: git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}

      - name: i18n locale key parity
        run: pnpm run i18n:check:keys

      - name: i18n production baseline
        run: pnpm run i18n:check:baseline

      - name: i18n changed-lines check
        run: pnpm run i18n:check:changed -- origin/${{ github.base_ref }}
