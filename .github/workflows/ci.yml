name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Fetch PR base branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}

      - name: i18n changed-lines check
        if: github.event_name == 'pull_request'
        run: pnpm run i18n:check:changed -- origin/${{ github.base_ref }}
