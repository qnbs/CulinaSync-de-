# =============================================================================
# CulinaSync – Deploy to GitHub Pages
# =============================================================================
# Builds the Vite PWA and deploys via the official GitHub Pages Actions.
#
# Prerequisites:
#   1. Go to Settings → Pages → Source → select "GitHub Actions"
#   2. Push to main or trigger manually
# =============================================================================

name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    # Build, validate and upload static artifact for the deploy job.
    uses: ./.github/workflows/validate.yml
    with:
      upload-pages-artifact: true

  deploy:
    # Deploy uploaded artifact to github-pages environment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
