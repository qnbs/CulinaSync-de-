# =============================================================================
# CulinaSync – Deploy to GitHub Pages
# =============================================================================
# Builds the Vite PWA and deploys via the official GitHub Pages Actions.
#
# Prerequisites:
#   1. Go to Settings → Pages → Source → select "GitHub Actions"
#   2. Push to main or trigger manually
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    # Build once and upload static artifact for the deploy job.
    runs-on: ubuntu-latest
    steps:
      # 1) Pull repository source code.
      - name: Checkout
        uses: actions/checkout@v5

      # 2) Install pnpm before enabling Node.js package manager cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # 3) Install Node.js 22 and enable pnpm dependency cache.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 4) Install exact lockfile dependencies.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5) Guard quality before deployment.
      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      # 6) Create production build into ./dist.
      - name: Build
        run: pnpm run build

      - name: Check bundle budget
        run: pnpm run check:bundle-budget

      # 7) Configure GitHub Pages deployment metadata.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 8) Upload built site artifact from ./dist.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  deploy:
    # Deploy uploaded artifact to github-pages environment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
