# =============================================================================
# CulinaSync – Deploy to GitHub Pages
# =============================================================================
# Builds the Vite PWA and deploys via the official GitHub Pages Actions.
#
# Prerequisites:
#   1. Go to Settings → Pages → Source → select "GitHub Actions"
#   2. Push to main or trigger manually
# =============================================================================

name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    # Build, validate and upload static artifact for the deploy job.
    uses: ./.github/workflows/validate.yml
    # QNBS-v3: pass only the coverage token (least privilege) into the reusable workflow
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    with:
      upload-pages-artifact: true
      # QNBS-v3: Chromium-CDN-Download auf ubuntu-latest >45min — Smoke via workflow_dispatch (e2e-smoke.yml)
      run-e2e-smoke: false

  deploy:
    # Deploy uploaded artifact to github-pages environment.
    # QNBS-v3: deployments:write scoped to this job only (not the build/validate job)
    permissions:
      contents: read
      pages: write
      id-token: write
      deployments: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke verify live deployments
        run: node scripts/verify-live-deployments.mjs

      # QNBS-v3: Keep only the 3 newest github-pages deployments | prevents Environment history bloat.
      # Uses the standard Deployments API (there is no list endpoint under /pages/deployments); a
      # deployment must be marked inactive before it can be deleted. gh + jq are preinstalled on runners.
      - name: Prune old GitHub Pages deployments (keep last 3)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/deployments?environment=github-pages&per_page=100" \
            --jq '.[] | "\(.created_at) \(.id)"' \
            | sort -rk1,1 \
            | tail -n +4 \
            | awk '{print $2}' \
            | while read -r id; do
                [ -z "$id" ] && continue
                echo "Pruning deployment $id"
                # Surface failures as warnings (not silently swallowed) while still
                # processing the remaining deployments; continue-on-error keeps the job green.
                gh api -X POST "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" \
                  -f state=inactive >/dev/null || echo "::warning::could not set deployment ${id} inactive"
                gh api -X DELETE "repos/${GITHUB_REPOSITORY}/deployments/${id}" >/dev/null || echo "::warning::could not delete deployment ${id}"
              done
