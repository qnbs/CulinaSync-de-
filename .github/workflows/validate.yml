name: Validate

# Reusable workflow — called by ci.yml and deploy.yml to avoid duplication.
# Runs: install → lint → type-check (tsgo) → test:coverage → artifact (lcov) → build → bundle budget
#       → Playwright-Smoke (vite preview) → (optional) Pages artifact. (npm audit: check:all.)

on:
  workflow_call:
    inputs:
      upload-pages-artifact:
        description: 'Configure Pages and upload the dist/ artifact after build'
        type: boolean
        default: false
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run type-check

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        with:
          name: coverage-lcov
          path: apps/web/coverage
          retention-days: 14

      - name: Build
        run: pnpm run build

      - name: Check bundle budget
        run: pnpm run check:bundle-budget

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level=high

      # QNBS-v3: Ein kurzer Smoke gegen `vite preview` (gebautes dist) — kein Dev-Server, keine schweren E2E-Suites
      - name: Install Playwright Chromium (retry)
        shell: bash
        run: |
          # QNBS-v3: CDN/Netzwerk kann flaken; 3 Versuche verhindern unnötig rote CI bei transienten Download-Fehlern
          for attempt in 1 2 3; do
            echo "Playwright install attempt ${attempt}/3"
            if pnpm exec playwright install --with-deps chromium; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Install failed, retry in 10s..."
              sleep 10
            fi
          done
          echo "Playwright install failed after 3 attempts"
          exit 1

      - name: E2E smoke (Playwright + preview)
        run: pnpm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7

      - name: Setup Pages
        if: inputs.upload-pages-artifact
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: inputs.upload-pages-artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './apps/web/dist'
