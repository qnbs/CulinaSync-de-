name: Validate

# Reusable workflow — called by ci.yml and deploy.yml to avoid duplication.
# Runs: install → lint → type-check (tsgo) → test:coverage → artifact (lcov) → build → bundle budget
#       → Playwright-Smoke (vite preview) → (optional) Pages artifact. (npm audit: check:all.)

on:
  workflow_call:
    inputs:
      upload-pages-artifact:
        description: 'Configure Pages and upload the dist/ artifact after build'
        type: boolean
        default: false
        required: false
      run-e2e-smoke:
        description: 'Run Playwright smoke against vite preview (slow browser download on cold runners)'
        type: boolean
        default: true
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run type-check

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Test deploy verify scripts
        run: pnpm run test:scripts

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: apps/web/coverage
          retention-days: 14

      # QNBS-v3: Upload lcov to Codecov for coverage analytics + PR annotations | non-blocking on outage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/coverage/lcov.info
          flags: web
          slug: qnbs/CulinaSync-de-
          fail_ci_if_error: false

      - name: Build
        run: pnpm run build

      - name: Check bundle budget
        run: pnpm run check:bundle-budget

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level=high

      # QNBS-v3: PR-CI überspringt E2E; Deploy nutzt Cache + chromium-only (ohne deprecated Action)
      - name: Cache Playwright browsers
        if: inputs.run-e2e-smoke
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium (retry)
        if: inputs.run-e2e-smoke
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "Playwright install attempt ${attempt}/3"
            if pnpm exec playwright install chromium; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep 10
            fi
          done
          exit 1

      - name: E2E smoke (Playwright + preview)
        if: inputs.run-e2e-smoke
        run: pnpm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report (on failure)
        if: inputs.run-e2e-smoke && failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7

      - name: Verify GitHub Pages artifact
        if: inputs.upload-pages-artifact
        run: node scripts/verify-pages-artifact.mjs apps/web/dist

      - name: Setup Pages
        if: inputs.upload-pages-artifact
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: inputs.upload-pages-artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './apps/web/dist'
