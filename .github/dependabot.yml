version: 2

updates:
  # npm / pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    ignore:
      # TypeScript 7 (the native Go compiler) is not yet supported by typescript-eslint —
      # a major bump crashes @typescript-eslint/typescript-estree ("Cannot read properties
      # of undefined (reading 'Cjs')"). tsc/typescript here is only used internally by
      # ESLint/Vitest (builds use tsgo), so stay on 6.x until typescript-eslint ships TS7
      # support. Minor/patch updates within 6.x still flow. (see closed PR #97)
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      testing:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "@testing-library/*"
          - "msw"
          - "jsdom"
          - "fake-indexeddb"
      linting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-*"
      build-tools:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "rollup*"
          - "postcss"
          - "autoprefixer"
          - "tailwindcss"
      typescript:
        patterns:
          - "typescript"
          - "@typescript/*"
          - "@types/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "dependencies"

  # Rust / Cargo (Tauri-Desktop) — src-tauri/Cargo.lock war bisher NICHT von Dependabot
  # abgedeckt (nur npm + github-actions), weshalb transitive RUSTSEC-Advisories wie der
  # glib-VariantStrIter-Alert (#23) nicht auto-getrackt wurden. Siehe SECURITY.md / R-GLIB.
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "rust"
