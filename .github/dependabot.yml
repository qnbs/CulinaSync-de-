version: 2

updates:
  # npm / pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      testing:
        patterns:
          - "vitest*"
          - "@vitest/*"
          - "@testing-library/*"
          - "msw"
          - "jsdom"
          - "fake-indexeddb"
      linting:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "eslint-plugin-*"
      build-tools:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "rollup*"
          - "postcss"
          - "autoprefixer"
          - "tailwindcss"
      typescript:
        patterns:
          - "typescript"
          - "@typescript/*"
          - "@types/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "dependencies"
