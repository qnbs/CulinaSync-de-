name: Bug Report
description: Einen Fehler in CulinaSync melden
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Danke, dass du dir die Zeit nimmst, diesen Fehler zu melden!

  - type: textarea
    id: description
    attributes:
      label: Fehlerbeschreibung
      description: Eine klare und präzise Beschreibung des Fehlers.
      placeholder: Was ist passiert?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Reproduzieren
      description: Wie kann der Fehler reproduziert werden?
      placeholder: |
        1. Gehe zu '...'
        2. Klicke auf '...'
        3. Scrolle zu '...'
        4. Fehler tritt auf
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
      description: Was hätte passieren sollen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Tatsächliches Verhalten
      description: Was ist stattdessen passiert?
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge
        - Andere
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Betriebssystem
      placeholder: z. B. Windows 11, macOS 14, Ubuntu 24.04

  - type: textarea
    id: context
    attributes:
      label: Zusätzlicher Kontext
      description: Screenshots, Fehlermeldungen aus der Konsole oder weitere Hinweise.
