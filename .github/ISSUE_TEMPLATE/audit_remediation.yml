name: Audit Remediation
description: Backlog-Item aus docs/AUDIT-REMEDIATION-BACKLOG.md
title: "[Audit] "
labels: ["audit", "enhancement"]
body:
  - type: dropdown
    id: backlog_id
    attributes:
      label: Backlog-ID
      options:
        - R-001
        - R-002
        - R-003
        - R-004
        - R-005
        - R-006
        - R-007
        - R-008
        - R-009
        - R-010
        - R-011
        - R-012
        - R-013
        - R-014
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
  - type: textarea
    id: why_now
    attributes:
      label: Why now?
      description: Impact und Dringlichkeit (1–3 Sätze)
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Definition of Done
      value: |
        - [ ] `pnpm run lint` + `type-check` + betroffene Tests grün
        - [ ] i18n de/en bei UI-Änderungen
        - [ ] CHANGELOG [Unreleased] bei user-visible Änderung
        - [ ] Alle PR-Review-Kommentare (CodeAnt/Copilot) adressiert
    validations:
      required: true
